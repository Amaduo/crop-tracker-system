<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2909/2909769.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #c8e6c9;
            backdrop-filter: blur(10px);
        }

        .login-title {
            text-align: center;
            font-weight: 700;
            color: #1b5e20;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #a5d6a7;
            border-radius: 10px;
            outline: none;
            background: #f9fff9;
            transition: 0.2s;
        }

        input:focus {
            border-color: #43a047;
            box-shadow: 0 0 5px rgba(67, 160, 71, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #43a047, #2e7d32);
            border: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.02);
        }

        /* NEW STYLE FOR REGISTER LINK */
        .register-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .register-link a {
            color: #2e7d32;
            font-weight: bold;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h3 class="login-title">🌱 Crop Tracker Login</h3>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <!-- NEW REGISTER LINK -->
    <div class="register-link">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>

</div>

</body>
</html>
