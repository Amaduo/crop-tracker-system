{% extends 'base.html' %}
{% block content %}

<div class="container-fluid py-4" style="min-height: 90vh; background: linear-gradient(135deg, #e8f5e9, #f1f8e9);">

    <div class="row justify-content-center align-items-center" style="min-height: 85vh;">

        <div class="col-12 col-sm-10 col-md-7 col-lg-5">

            <div class="card shadow-lg border-0" style="border-radius: 18px; overflow: hidden;">

                <!-- HEADER -->
                <div class="card-header text-white text-center"
                     style="background: linear-gradient(135deg, #2e7d32, #66bb6a);">
                    <h3 class="mb-0">Create Account</h3>
                </div>

                <!-- BODY -->
                <div class="card-body p-4" style="background: #f9fff9;">

                    <form method="POST">
                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" required
                                   style="border-radius: 10px; padding: 10px;">
                        </div>

                        <!-- Role -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Role</label>
                            <select name="role" class="form-control" required
                                    style="border-radius: 10px; padding: 10px;">
                                <option value="">-- Select Role --</option>
                                <option value="admin">Admin</option>
                                <option value="agent">Field Agent</option>
                            </select>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password1" class="form-control" required
                                   style="border-radius: 10px; padding: 10px;">
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Confirm Password</label>
                            <input type="password" name="password2" class="form-control" required
                                   style="border-radius: 10px; padding: 10px;">
                        </div>

                        <!-- BUTTON -->
                        <button type="submit" class="btn btn-success w-100"
                                style="border-radius: 10px; padding: 10px; font-weight: bold;">
                            Register
                        </button>

                    </form>

                    <!-- LOGIN LINK -->
                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" style="color: #2e7d32; text-decoration: none; font-weight: 500;">
                            ← Back to login
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
