{% extends 'base.html' %}
{% block content %}

<div class="container-fluid py-4" style="background: #f4fbf4; min-height: 100vh;">

    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">

            <div class="card shadow-lg border-0" style="border-radius: 18px; overflow: hidden;">

                <!-- HEADER -->
                <div class="card-header text-white text-center"
                     style="background: linear-gradient(135deg, #1b5e20, #66bb6a); padding: 18px;">
                    <h3 class="mb-0 fw-bold">📊 Field Updates</h3>
                </div>

                <!-- BODY -->
                <div class="card-body p-3 p-md-4" style="background: #f9fff9;">

                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <!-- TABLE HEADER -->
                            <thead style="background: #2e7d32; color: white;">
                                <tr>
                                    <th>Field</th>
                                    <th>Agent</th>
                                    <th>Stage</th>
                                    <th>Notes</th>
                                    <th>Date</th>
                                </tr>
                            </thead>

                            <!-- TABLE BODY -->
                            <tbody>

                            {% for u in updates %}
                            <tr style="transition: 0.2s;">

                                <td>
                                    <strong style="color:#1b5e20;">
                                        {{ u.field.name }}
                                    </strong>
                                </td>

                                <td>{{ u.agent }}</td>

                                <td>
                                    <span class="badge rounded-pill"
                                          style="background: #43a047; padding: 8px 10px;">
                                        {{ u.stage }}
                                    </span>
                                </td>

                                <td style="max-width: 320px; word-wrap: break-word;">
                                    {{ u.notes }}
                                </td>

                                <td style="white-space: nowrap;">
                                    {{ u.date }}
                                </td>

                            </tr>

                            {% empty %}
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <strong>No updates available</strong>
                                </td>
                            </tr>
                            {% endfor %}

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
